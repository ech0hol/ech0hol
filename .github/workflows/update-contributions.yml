name: Update Contributions

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch & Update README
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 获取 ech0hol 在 bytedance/deer-flow 的已合并 PR
          PRS=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/search/issues?q=repo:bytedance/deer-flow+author:ech0hol+type:pr+is:merged&per_page=30" \
            | jq -r '.items | sort_by(.number) | .[] | "| [#\(.number)](\(.html_url)) | \(.title) | ✅ Merged |"')

          # 获取 ech0hol 在 bytedance/deer-flow 的已关闭 Issue
          CLOSED_ISSUES=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/search/issues?q=repo:bytedance/deer-flow+author:ech0hol+type:issue+is:closed&per_page=30" \
            | jq -r '.items | sort_by(.number) | .[] | "| [#\(.number)](\(.html_url)) | \(.title) | ✅ Closed |"')

          # 构建 Markdown 表格
          {
            echo "### Merged Pull Requests"
            echo ""
            echo "| PR | Description | Status |"
            echo "|----|-------------|--------|"
            if [ -n "$PRS" ]; then echo "$PRS"; else echo "| - | No merged PRs yet | - |"; fi
            echo ""
            echo "### Closed Issues"
            echo ""
            echo "| Issue | Description | Status |"
            echo "|-------|-------------|--------|"
            if [ -n "$CLOSED_ISSUES" ]; then echo "$CLOSED_ISSUES"; else echo "| - | No closed issues yet | - |"; fi
            echo ""
            echo "### Open Issues"
            echo ""
            echo "| Issue | Description | Status |"
            echo "|-------|-------------|--------|"
            if [ -n "$OPEN_ISSUES" ]; then echo "$OPEN_ISSUES"; else echo "| - | No open issues | - |"; fi
          } > /tmp/contributions.txt

          # 用 sed 替换 README.md 中占位符之间的内容
          sed -i '/<!--START_SECTION:contributions-->/,/<!--END_SECTION:contributions-->/{//!d}' README.md
          sed -i "/<!--START_SECTION:contributions-->/r /tmp/contributions.txt" README.md

          # 提交变更
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md && echo "No changes" || (git add README.md && git commit -m "Update contributions [skip ci]" && git push)
