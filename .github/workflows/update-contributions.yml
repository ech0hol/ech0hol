name: Update Contributions

on:
  schedule:
    - cron: '0 11,23 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch & Update README
        env:
          GITHUB_TOKEN: *** secrets.GITHUB_TOKEN }}
        run: |
          # 获取 ech0hol 在 bytedance/deer-flow 的已合并 PR
          PRS=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/search/issues?q=repo:bytedance/deer-flow+author:ech0hol+type:pr+is:merged&per_page=30" \
            | jq -r '.items | sort_by(.number) | .[] | "| [#\(.number)](\(.html_url)) | \(.title) | ✅ Merged |"')

          # 构建英文 Markdown 表格
          {
            echo "### Merged Pull Requests"
            echo ""
            echo "| PR | Description | Status |"
            echo "|----|-------------|--------|"
            if [ -n "$PRS" ]; then echo "$PRS"; else echo "| - | No merged PRs yet | - |"; fi
            echo ""
          } > /tmp/contributions_en.txt

          # 构建中文 Markdown 表格
          # 翻译映射：英文 title → 中文描述
          translate() {
            local title="$1"
            case "$title" in
              "fix(frontend): prevent user message bubble overflow with long unbreakable strings")
                echo "fix(前端): 修复长不可断字符串导致用户消息气泡溢出" ;;
              "fix(runtime): propagate interrupt through SSE values events for LangGraph SDK")
                echo "fix(运行时): 通过 SSE values 事件传播 interrupt 以支持 LangGraph SDK" ;;
              "fix(smoke-test): add auth-aware frontend checks with login support")
                echo "fix(冒烟测试): 添加带登录支持的鉴权感知前端检查" ;;
              "fix(security): inject system context as SystemMessage for role isolation (#3630)")
                echo "fix(安全): 将系统上下文注入为 SystemMessage 实现角色隔离 (#3630)" ;;
              "fix(security): add input sanitization middleware for prompt-injection defense (#3630)")
                echo "fix(安全): 添加输入净化中间件防御提示词注入 (#3630)" ;;
              "fix(memory): filter hide_from_ui HumanMessages from memory builder")
                echo "fix(记忆): 从记忆构建器中过滤 hide_from_ui 的 HumanMessage" ;;
              "fix(agents): coalesce SystemMessages before LLM request")
                echo "fix(Agent): LLM 请求前合并重复的 SystemMessage" ;;
              "fix(middleware): prevent ID-swap recursive injection and orphan peer compression")
                echo "fix(中间件): 防止 ID-swap 递归注入及孤立 peer 压缩" ;;
              "feat(skills): per-user custom skill isolation with sandbox mounting")
                echo "feat(技能): 基于沙箱挂载的用户级自定义技能隔离" ;;
              *)
                echo "$title" ;;
            esac
          }

          # 逐行翻译 PR 描述
          PRS_ZH=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/search/issues?q=repo:bytedance/deer-flow+author:ech0hol+type:pr+is:merged&per_page=30" \
            | jq -r '.items | sort_by(.number) | .[] | "\(.title)\t#\(.number)\t\(.html_url)"')

          {
            echo "### 已合并的 Pull Request"
            echo ""
            echo "| PR | 描述 | 状态 |"
            echo "|----|------|------|"
            if [ -n "$PRS_ZH" ]; then
              while IFS=$'\t' read -r title number url; do
                zh_title=$(translate "$title")
                echo "| [#$number]($url) | $zh_title | ✅ 已合并 |"
              done <<< "$PRS_ZH"
            else
              echo "| - | 暂无已合并的 PR | - |"
            fi
            echo ""
          } > /tmp/contributions_zh.txt

          # 替换英文段
          sed -i '/<!--START_SECTION:contributions-->/,/<!--END_SECTION:contributions-->/{//!d}' README.md
          sed -i "/<!--START_SECTION:contributions-->/r /tmp/contributions_en.txt" README.md

          # 替换中文段
          sed -i '/<!--START_SECTION:contributions_zh-->/,/<!--END_SECTION:contributions_zh-->/{//!d}' README.md
          sed -i "/<!--START_SECTION:contributions_zh-->/r /tmp/contributions_zh.txt" README.md

          # 提交变更
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md && echo "No changes" || (git add README.md && git commit -m "Update contributions [skip ci]" && git push)
