name: Update Contributions

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - .github/workflows/contribution-graph.yml

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate SVG
        run: |
          pip install httpx

          python3 - <<'PYEOF'
          import httpx, json
          from datetime import datetime, timedelta

          # Use REST API to get contribution events (no GraphQL needed)
          today = datetime.utcnow()
          start = today - timedelta(days=365)

          # Scrape the profile page HTML for the contribution calendar
          resp = httpx.get(
              "https://github.com/ech0hol",
              headers={"User-Agent": "Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36"},
              follow_redirects=True,
              timeout=30,
          )

          import re
          # Extract the JS data that contains the calendar
          match = re.search(r'data-target="react-app\.embeddedData" data-props="([^"]+)"', resp.text)
          if not match:
              # Fallback: scrape raw HTML rect elements
              from html.parser import HTMLParser

              class CalParser(HTMLParser):
                  def __init__(self):
                      super().__init__()
                      self.cells = []
                      self.in_rect = False
                      self.current = {}

                  def handle_starttag(self, tag, attrs):
                      if tag == "td" and any(a[0] == "class" and "ContributionCalendar-day" in (a[1] or "") for a in attrs):
                          self.in_rect = True
                          self.current = {}
                          for a in attrs:
                              if a[0] == "data-date": self.current["date"] = a[1]
                              if a[0] == "data-count": self.current["count"] = int(a[1] or 0)
                              if a[0] == "data-level": self.current["level"] = int(a[1] or 0)

                  def handle_endtag(self, tag):
                      if tag == "td" and self.in_rect:
                          self.in_rect = False
                          if self.current:
                              self.cells.append(self.current)

                  def handle_data(self, data):
                      pass

              parser = CalParser()
              parser.feed(resp.text)
              cells = parser.cells
          else:
              from html import unescape
              data = json.loads(unescape(match.group(1)))
              cal = data.get("payload", {}).get("user", {}).get("contributionsCollection", {}).get("contributionCalendar", {})
              weeks = cal.get("weeks", [])
              cells = []
              for week in weeks:
                  for day in week.get("contributionDays", []):
                      cells.append({
                          "date": day.get("date", ""),
                          "count": day.get("contributionCount", 0),
                          "level": min(4, day.get("contributionCount", 0)),
                      })

          if not cells:
              print("WARNING: No cells extracted, generating empty graph")
              cells = [{"date": "", "count": 0, "level": 0}] * 371

          # Build SVG
          cell_size = 10
          cell_gap = 3
          step = cell_size + cell_gap
          num_weeks = max(53, len(cells) // 7)
          width = num_weeks * step + 50
          height = 7 * step + 40

          colors = ["#161b22", "#0e4429", "#006d32", "#26a641", "#39d353"]
          month_names = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"]

          # Month labels
          month_svgs = ""
          last_month = ""
          for i, cell in enumerate(cells):
              if i % 7 != 0 or not cell["date"]:
                  continue
              try:
                  dt = datetime.strptime(cell["date"], "%Y-%m-%d")
                  m = month_names[dt.month - 1]
                  if m != last_month:
                      x = (i // 7) * step + 35
                      month_svgs += f'<text x="{x}" y="18" font-size="10" fill="#8b949e" font-family="monospace">{m}</text>'
                      last_month = m
              except:
                  pass

          # Day labels
          day_svgs = ""
          for di, dn in enumerate(["Mon","Wed","Fri"]):
              y = di * 2 * step + step + 30
              day_svgs += f'<text x="2" y="{y}" font-size="9" fill="#8b949e" font-family="monospace">{dn}</text>'

          # Cells
          rect_svgs = ""
          for i, cell in enumerate(cells):
              week_idx = i // 7
              day_idx = i % 7
              x = week_idx * step + 35
              y = day_idx * step + 25
              level = cell.get("level", 0)
              color = colors[min(level, 4)]
              count = cell.get("count", 0)
              date_str = cell.get("date", "")
              rect_svgs += f'<rect x="{x}" y="{y}" width="{cell_size}" height="{cell_size}" rx="2" ry="2" fill="{color}">'
              if count > 0:
                  rect_svgs += f'<title>{count} contributions on {date_str}</title>'
              rect_svgs += '</rect>'

          total = sum(c.get("count", 0) for c in cells)

          svg = f'''<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 {width} {height}" width="{width}" height="{height}">
          <style>:hover {{ opacity: 0.8; }}</style>
          <rect width="100%" height="100%" fill="#0d1117" rx="6"/>
          <text x="10" y="15" font-size="11" fill="#c9d1d9" font-family="monospace">{total} contributions in the last year</text>
          {month_svgs}
          {day_svgs}
          {rect_svgs}
          </svg>'''

          import os
          os.makedirs("assets", exist_ok=True)
          with open("assets/contribution-graph.svg", "w") as f:
              f.write(svg)
          print(f"Generated SVG with {len(cells)} cells, {total} total contributions")
          PYEOF

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/contribution-graph.svg
          git diff --quiet HEAD -- assets/contribution-graph.svg && echo "No changes" || (git commit -m "Update contribution graph [skip ci]" && git push)
